name: tzmc_push
description: TZMC Push Messaging App - Flutter mobile client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

  # State Management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0
  connectivity_plus: ^5.0.2

  # Local Storage
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  path: ^1.8.3

  # Realtime
  socket_io_client: ^2.0.3+1
  web_socket_channel: ^2.4.4

  # Push Notifications
  firebase_core: ^2.25.4
  firebase_messaging: ^14.7.15
  flutter_local_notifications: ^17.0.0

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Utilities
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  equatable: ^2.0.5
  collection: ^1.18.0
  path_provider: ^2.1.2
  logger: ^2.0.2+1
  permission_handler: ^11.3.0

  # UI
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  drift_dev: ^2.15.0
  freezed: ^2.4.7
  mockito: ^5.4.4
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Heebo
      fonts:
        - asset: assets/fonts/Heebo-Regular.ttf
        - asset: assets/fonts/Heebo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Heebo-Bold.ttf
          weight: 700
