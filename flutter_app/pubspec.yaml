name: tzmc_push
description: TZMC Push Messaging App - Flutter mobile client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.6
  intl: 0.19.0

  # State Management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  retrofit: ^4.6.0
  connectivity_plus: ^7.1.1

  # Local Storage
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  # drift_flutter 0.2.8+ pulls drift 2.30+, which forces drift_dev onto
  # source_gen 3.x and breaks retrofit_generator 9.6 on Dart 3.6 CI.
  drift_flutter: ^0.2.7  # Cross-platform database support (includes web)
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  path: ^1.8.3

  # Realtime
  socket_io_client: ^2.0.3+1
  web_socket_channel: ^3.0.1

  # Push Notifications
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^19.5.0

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Utilities
  json_annotation: ^4.8.1
  # Flutter CI runs on Flutter 3.27.4 / Dart 3.6.2, so keep freezed on the
  # last range that does not pull in Dart >=3.7 build dependencies.
  freezed_annotation: ">=3.0.0 <3.1.0"
  equatable: ^2.0.5
  collection: ^1.18.0
  path_provider: ^2.1.2
  logger: ^2.0.2+1
  permission_handler: ^12.0.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.0

  # UI
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0

# Pin transitive Flutter plugin Android modules to versions whose buildscript
# uses the Kotlin Gradle plugin 2.1.0 (matching `android/settings.gradle.kts`).
# Newer releases of `shared_preferences_android` (>=2.4.19) require the
# Kotlin Gradle plugin 2.3.0, which forces Gradle to download new Kotlin
# plugin artifacts from Maven Central. That download fails on networks where
# the JDK truststore cannot validate the Maven Central TLS certificate
# (PKIX path building / SSL handshake errors). Pinning to 2.4.2 keeps the
# build on the already-resolved Kotlin 2.1.0 toolchain and avoids the
# additional artifact downloads.
dependency_overrides:
  shared_preferences_android: 2.4.2
  # Mockito 5.4.x uses analyzer internals that changed in analyzer 7.x.
  # Keep analyzer pinned to a stable 6.x release for build_runner precompile.
  analyzer: 6.11.0
  # Force resolver to an older build_runner line if transitive deps try to pull
  # analyzer 7.x back in through newer build tooling.
  build_runner: 2.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Keep build_runner aligned with dependency_overrides to avoid analyzer 7.x pull-in.
  build_runner: 2.4.9
  json_serializable: ^6.7.1
  retrofit_generator: ">=9.6.0 <9.7.0"
  drift_dev: ^2.15.0
  freezed: ">=3.0.0 <3.1.0"
  # Mockito 5.4.x relies on analyzer internals and is stable on analyzer 6.x.
  analyzer: 6.11.0
  mockito: ">=5.4.4 <5.5.0"
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Heebo
      fonts:
        - asset: assets/fonts/Heebo-Regular.ttf
        - asset: assets/fonts/Heebo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Heebo-Bold.ttf
          weight: 700
