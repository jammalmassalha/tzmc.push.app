org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djavax.net.ssl.trustStoreType=JKS
android.useAndroidX=true
android.enableJetifier=true

# SSL/TLS Configuration for dependency resolution
# These settings help when behind corporate proxies or with certificate issues
systemProp.https.protocols=TLSv1.2,TLSv1.3
systemProp.javax.net.ssl.trustStore=NONE
systemProp.javax.net.ssl.trustStoreType=Windows-ROOT

# For CI environments without Windows truststore, use default JKS
# systemProp.javax.net.ssl.trustStoreType=JKS

# Gradle daemon and caching settings for faster builds
org.gradle.daemon=true
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configureondemand=true
