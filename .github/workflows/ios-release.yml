name: iOS Release Build

# Build a signed iOS .ipa using a GitHub-hosted macOS runner.
# You do NOT need a Mac — everything runs in the cloud.
#
# ─── REQUIRED GITHUB SECRETS ────────────────────────────────────────────────
#
#  P12_BASE64
#      Your Apple Distribution certificate exported from Keychain Access as a
#      .p12 file, then base64-encoded:
#        base64 -i Certificates.p12 | tr -d '\n'
#      (on Linux/CI use: base64 -w0 Certificates.p12)
#
#  P12_PASSWORD
#      The password you set when exporting the .p12 (may be empty string "").
#
#  MOBILEPROVISION_BASE64
#      Your provisioning profile (.mobileprovision) base64-encoded:
#        base64 -i MyApp.mobileprovision | tr -d '\n'
#      Download from https://developer.apple.com/account/resources/profiles
#
#  KEYCHAIN_PASSWORD
#      Optional override for temporary CI keychain password.
#      If omitted, the workflow generates a random password per run.
#
#  APPLE_TEAM_ID
#      Your 10-character Apple Developer Team ID, found at
#      https://developer.apple.com/account → Membership → Team ID
#
#  GOOGLE_SERVICE_INFO_PLIST_BASE64   (optional but required for FCM)
#      GoogleService-Info.plist from the Firebase console, base64-encoded:
#        base64 -i GoogleService-Info.plist | tr -d '\n'   # macOS
#        base64 -w0 GoogleService-Info.plist               # Linux
#      Without this secret push notifications will be silently disabled.
#
#  APPSTORE_ISSUER_ID   (required only when distribution_method = app-store)
#      App Store Connect API key Issuer ID (UUID).
#      Found at https://appstoreconnect.apple.com/access/integrations/api
#      → "Keys" tab → "Issuer ID" shown at the top of the page.
#
#  APPSTORE_API_KEY_ID   (required only when distribution_method = app-store)
#      The Key ID for the App Store Connect API key you created.
#      Shown in the "Keys" table on the same page as the Issuer ID.
#
#  APPSTORE_API_PRIVATE_KEY   (required only when distribution_method = app-store)
#      The full PKCS8 private key content (the .p8 file you downloaded when
#      you created the API key).  Paste the entire file content, including the
#      -----BEGIN PRIVATE KEY----- / -----END PRIVATE KEY----- lines.
#      ⚠️  Apple lets you download it only ONCE — store it safely.
#
# ─── HOW TO TRIGGER ─────────────────────────────────────────────────────────
#
#  GitHub → Actions → "iOS Release Build" → "Run workflow"
#  Choose distribution method and optional version override, then click Run.
#
# ─── OUTPUTS ────────────────────────────────────────────────────────────────
#
#  The signed .ipa is uploaded as a GitHub Actions artifact called
#  "ios-release-ipa" and kept for 30 days.
#  When distribution_method is "app-store" and the three APPSTORE_* secrets
#  are set, the build is also uploaded directly to TestFlight automatically
#  (no Mac or manual step required).
#
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      distribution_method:
        description: 'Distribution method'
        required: true
        default: 'app-store'
        type: choice
        options:
          - app-store
          - ad-hoc
          - development
      version_name:
        description: 'Version name override (e.g. 1.2.3) — leave blank to use pubspec version'
        required: false
        default: ''
      build_number:
        description: 'Build number override (e.g. 42) — leave blank to use pubspec value'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.27.4'
  BUNDLE_ID: 'co.il.tzmc.tzmcPush'

jobs:
  build-ios:
    name: Build & Sign iOS IPA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      # ── 1. Source code ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Flutter ────────────────────────────────────────────────────────
      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Deep clean build cache
        run: |
          rm -rf .dart_tool/build
          rm -f pubspec.lock

      - name: Get dependencies
        run: flutter pub get

      - name: Verify analyzer override (6.11.0)
        run: |
          if ! dart pub deps | grep -Eq 'analyzer 6\.11\.0'; then
            echo "::error::analyzer override not applied (expected 6.11.0)."
            dart pub deps | grep analyzer || true
            exit 1
          fi

      # ── 3. Install Apple distribution certificate ─────────────────────────
      - name: Import distribution certificate into a temporary Keychain
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD_SECRET: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${P12_BASE64:-}" ]; then
            echo "::error::P12_BASE64 secret is not set."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD_SECRET:-$(openssl rand -hex 20)}"

          # Decode certificate
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Create a dedicated temporary keychain so we never touch the
          # login keychain, and the keychain is automatically cleaned up.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "${P12_PASSWORD:-}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      # ── 4. Install provisioning profile ───────────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          if [ -z "${PROFILE_BASE64:-}" ]; then
            echo "::error::MOBILEPROVISION_BASE64 secret is not set."
            exit 1
          fi

          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          # Extract the UUID so Xcode can find it by UUID in the profiles dir
          PROFILE_UUID=$(
            plutil -extract UUID raw -o - "$PROFILE_PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy \
                    -c "Print :UUID" \
                    "$PROFILE_PLIST"
          )
          PROFILE_NAME=$(
            plutil -extract Name raw -o - "$PROFILE_PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST"
          )
          GET_TASK_ALLOW=$(
            plutil -extract Entitlements.get-task-allow raw -o - "$PROFILE_PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Print :Entitlements:get-task-allow" "$PROFILE_PLIST" 2>/dev/null \
              || echo "false"
          )
          PROVISIONS_ALL_DEVICES=$(
            plutil -extract ProvisionsAllDevices raw -o - "$PROFILE_PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Print :ProvisionsAllDevices" "$PROFILE_PLIST" 2>/dev/null \
              || echo "false"
          )
          if /usr/libexec/PlistBuddy -c "Print :ProvisionedDevices:0" "$PROFILE_PLIST" >/dev/null 2>&1; then
            HAS_PROVISIONED_DEVICES=true
          else
            HAS_PROVISIONED_DEVICES=false
          fi

          if [ "$PROVISIONS_ALL_DEVICES" = "true" ]; then
            PROFILE_KIND="enterprise"
            PROFILE_EXPORT_METHOD="enterprise"
          elif [ "$HAS_PROVISIONED_DEVICES" = "true" ] && [ "$GET_TASK_ALLOW" = "true" ]; then
            PROFILE_KIND="development"
            PROFILE_EXPORT_METHOD="development"
          elif [ "$HAS_PROVISIONED_DEVICES" = "true" ]; then
            PROFILE_KIND="ad-hoc"
            # Xcode 26 deprecated the old "ad-hoc" export method name.
            PROFILE_EXPORT_METHOD="release-testing"
          else
            PROFILE_KIND="app-store"
            PROFILE_EXPORT_METHOD="app-store"
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" \
            "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "PROFILE_KIND=$PROFILE_KIND" >> "$GITHUB_ENV"
          echo "PROFILE_EXPORT_METHOD=$PROFILE_EXPORT_METHOD" >> "$GITHUB_ENV"
          echo "Installed profile UUID: $PROFILE_UUID"
          echo "Installed profile name: $PROFILE_NAME"
          echo "Detected provisioning profile type: $PROFILE_KIND"

      - name: Validate selected distribution method against provisioning profile
        env:
          SELECTED_METHOD: ${{ inputs.distribution_method }}
        run: |
          case "$SELECTED_METHOD" in
            app-store)
              EXPECTED_PROFILE_KIND="app-store"
              EXPECTED_EXPORT_METHOD="app-store"
              ;;
            ad-hoc)
              EXPECTED_PROFILE_KIND="ad-hoc"
              EXPECTED_EXPORT_METHOD="release-testing"
              ;;
            development)
              EXPECTED_PROFILE_KIND="development"
              EXPECTED_EXPORT_METHOD="development"
              ;;
            *)
              echo "::error::Unsupported distribution_method '$SELECTED_METHOD'."
              exit 1
              ;;
          esac

          if [ "${PROFILE_EXPORT_METHOD:-}" != "$EXPECTED_EXPORT_METHOD" ]; then
            echo "::error::Selected distribution_method '$SELECTED_METHOD' expects a $EXPECTED_PROFILE_KIND provisioning profile, but MOBILEPROVISION_BASE64 contains '$PROFILE_KIND' profile '$PROFILE_NAME'."
            echo "::notice::Use distribution_method='app-store' for TestFlight/App Store profiles, 'ad-hoc' for Ad Hoc device builds, and 'development' for development profiles."
            exit 1
          fi

          echo "distribution_method '$SELECTED_METHOD' matches provisioning profile '$PROFILE_NAME' ($PROFILE_KIND)."

      # ── 5. Flutter dependencies & code generation ─────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── 5a. Firebase iOS config ───────────────────────────────────────────
      - name: Materialize GoogleService-Info.plist from secret
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -z "${GOOGLE_SERVICE_INFO_PLIST_BASE64:-}" ]; then
            echo "::warning::GOOGLE_SERVICE_INFO_PLIST_BASE64 secret is not set. The built IPA will NOT support Firebase/FCM push notifications."
          else
            mkdir -p ios/Runner
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
            echo "Decoded GoogleService-Info.plist ($(wc -c < ios/Runner/GoogleService-Info.plist) bytes)"
          fi

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # ── 6. Optional version override ──────────────────────────────────────
      - name: Override version in pubspec.yaml
        if: ${{ inputs.version_name != '' || inputs.build_number != '' }}
        run: |
          VERSION="${{ inputs.version_name }}"
          BUILD="${{ inputs.build_number }}"

          # Read current values as fallback
          CURRENT=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          CURRENT_NAME="${CURRENT%%+*}"
          CURRENT_BUILD="${CURRENT##*+}"

          BASE_VERSION="${VERSION:-$CURRENT_NAME}"
          BASE_BUILD="${BUILD:-$CURRENT_BUILD}"

          # Allow short numeric forms like 1 or 1.2 and normalize to x.y.z
          if [[ "$BASE_VERSION" =~ ^[0-9]+$ ]]; then
            BASE_VERSION="${BASE_VERSION}.0.0"
          elif [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            BASE_VERSION="${BASE_VERSION}.0"
          fi

          if ! [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version_name '$BASE_VERSION'. Use semantic version format x.y.z (e.g. 1.0.0)."
            exit 1
          fi

          if ! [[ "$BASE_BUILD" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid build_number '$BASE_BUILD'. Use a numeric value (e.g. 22)."
            exit 1
          fi

          FINAL_VERSION="${BASE_VERSION}+${BASE_BUILD}"
          echo "Setting version to: $FINAL_VERSION"
          sed -i '' "s/^version:.*/version: $FINAL_VERSION/" pubspec.yaml

      # ── 7. Generate ExportOptions.plist ───────────────────────────────────
      - name: Generate ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::error::APPLE_TEAM_ID secret is not set."
            exit 1
          fi

          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${PROFILE_EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          echo "ExportOptions.plist:"
          cat "$RUNNER_TEMP/ExportOptions.plist"

      # ── 8. Select Xcode 26 (iOS 26 SDK required by App Store Connect) ────────
      - name: Select Xcode 26
        run: |
          # Locate Xcode 26 installation; fail if not found so the error is clear.
          XCODE_26=$(find /Applications -maxdepth 1 -name "Xcode_26*.app" 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_26" ]; then
            # macOS runners may ship Xcode 26 as the default "Xcode.app" on
            # images that were published after June 2025.
            XCODE_CURRENT=$(xcode-select -p | sed 's|/Contents/Developer||')
            XCODE_MAJOR=$(xcodebuild -version 2>/dev/null | head -1 | awk '{print $2}' | cut -d. -f1)
            if [ "${XCODE_MAJOR:-0}" -ge 26 ] 2>/dev/null; then
              echo "Default Xcode is already version ${XCODE_MAJOR} — no switch needed."
            else
              echo "::error::Xcode 26 is not installed on this runner (found Xcode ${XCODE_MAJOR:-unknown} at ${XCODE_CURRENT}). Use a macOS runner image that ships with Xcode 26."
              exit 1
            fi
          else
            sudo xcode-select -s "$XCODE_26/Contents/Developer"
            echo "Switched to Xcode: $XCODE_26"
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      # ── 9. Build signed IPA ───────────────────────────────────────────────
      - name: Build Flutter IPA
        run: |
          # 1. Build the archive without trying to sign it yet
          flutter build ipa --release --no-codesign

          # 2. Patch App.framework Info.plist to set MinimumOSVersion.
          #    Flutter's build tooling may leave this key empty (ITMS-90530 /
          #    ITMS-90360).  Setting it explicitly to the project's deployment
          #    target (15.0) satisfies App Store Connect validation.
          APP_FRAMEWORK_PLIST="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/App.framework/Info.plist"
          if [ -f "$APP_FRAMEWORK_PLIST" ]; then
            # Delete the key first (no-op if absent), then add with the
            # correct value — this handles the key being missing OR empty.
            /usr/libexec/PlistBuddy -c "Delete :MinimumOSVersion" "$APP_FRAMEWORK_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 15.0" "$APP_FRAMEWORK_PLIST"
            echo "Set MinimumOSVersion=15.0 in App.framework Info.plist"
          else
            echo "::warning::App.framework Info.plist not found at expected path — skipping MinimumOSVersion patch."
          fi

          # 3. Now use Xcode to sign and export it using your P12 and Profile
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates

          # 4. Copy to dist folder (same as your previous logic)
          mkdir -p ../dist/ios
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No .ipa file found. Check signing logs above."
            exit 1
          fi
          cp "$IPA_PATH" ../dist/ios/tzmc-push-release.ipa

      # ── 10. Upload artifact ───────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: dist/ios/tzmc-push-release.ipa
          retention-days: 30

      # ── 11. Upload to TestFlight (app-store builds only) ─────────────────
      - name: Upload to TestFlight
        if: ${{ inputs.distribution_method == 'app-store' }}
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: dist/ios/tzmc-push-release.ipa
          app-type: ios
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      # ── 12. Cleanup keychain ──────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
