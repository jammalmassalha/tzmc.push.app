<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#293B8F">
    <title>TZMC | Offline</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f0f2f5;
        color: #111b21;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }
      .card {
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        max-width: 420px;
      }
      h1 {
        margin: 0 0 12px;
        color: #293B8F;
        font-size: 22px;
      }
      p {
        margin: 0 0 16px;
        color: #54656f;
        line-height: 1.5;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: #d32f2f;
      }
      .status::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #d32f2f;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>אין חיבור לאינטרנט</h1>
      <p>נראה שאתה במצב לא מקוון. ננסה להתחבר מחדש כשחיבור יהיה זמין.</p>
      <div class="status">לא מחובר</div>
    </div>
  </body>
</html>
