<h2 mat-dialog-title class="hr-dialog-title">
  <span class="hr-dialog-title-icon">
    <mat-icon>format_list_bulleted</mat-icon>
  </span>
  <span>Quick selection</span>
</h2>

<mat-dialog-content class="hr-dialog-content">
  <p class="hr-dialog-prompt">{{ data.prompt }}</p>

  <div class="hr-dialog-options" role="listbox" aria-label="Choice options">
    @for (option of data.options; track option.choiceNumber + '-' + $index) {
      <button
        type="button"
        class="hr-dialog-option"
        (click)="choose(option)"
        [attr.aria-label]="'Choose option ' + option.choiceNumber">
        <span class="hr-dialog-option-number">{{ option.choiceNumber }}</span>
        <span class="hr-dialog-option-label">{{ option.label }}</span>
        <mat-icon class="hr-dialog-option-arrow">chevron_left</mat-icon>
      </button>
    }
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close>Close</button>
</mat-dialog-actions>
