<h2 mat-dialog-title>העבר הודעה</h2>

<mat-dialog-content class="fwd-content">
  <div class="fwd-panel">
    <label class="fwd-search-shell">
      <mat-icon class="fwd-search-icon">search</mat-icon>
      <input
        class="fwd-search-input"
        type="text"
        [formControl]="searchControl"
        placeholder="שם, מספר או קבוצה"
        aria-label="חיפוש צ׳אט"
        autocomplete="off" />
      @if (searchControl.value?.length > 0) {
        <button
          type="button"
          class="fwd-search-clear"
          (click)="clearSearch($event)"
          aria-label="נקה חיפוש">
          <mat-icon>close</mat-icon>
        </button>
      }
    </label>

    @if (!filteredChats().length) {
      <div class="empty-state">לא נמצאו צ׳אטים מתאימים.</div>
    } @else {
      <div class="chat-list">
        @for (chat of filteredChats(); track chat.id) {
          <button type="button" class="chat-row" (click)="chooseChat(chat.id)">
            <span class="chat-avatar">
              <span class="chat-avatar-fallback">{{ avatarFallback(chat.title) }}</span>
            </span>
            <div class="chat-row-main">
              <span class="chat-title-row">
                <span class="name">{{ chat.title }}</span>
                @if (chat.isGroup) {
                  <span class="group-badge">קבוצה</span>
                }
                @if (isCurrentChat(chat.id)) {
                  <span class="current-badge">צ׳אט נוכחי</span>
                }
              </span>
              @if (chat.info) {
                <span class="info">{{ chat.info }}</span>
              }
              <span class="meta">{{ chat.id }}</span>
            </div>
          </button>
        }
      </div>
    }
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close>ביטול</button>
</mat-dialog-actions>
