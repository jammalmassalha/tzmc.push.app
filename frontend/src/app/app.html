@if (startupLoaderVisible()) {
  <section class="startup-loader" aria-live="polite" aria-busy="true">
    <div class="startup-loader__content">
      <div class="startup-loader__circle" role="status" aria-label="טוען את האפליקציה">
        <span class="startup-loader__counter">{{ startupLoaderSeconds() }}</span>
      </div>
      <p class="startup-loader__text">טוען את האפליקציה…</p>
    </div>
  </section>
}

<router-outlet />
