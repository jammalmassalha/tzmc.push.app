<!DOCTYPE html>
<html lang="he" dir="rtl">
    <head>
      <link rel="icon" href="favicon.ico">
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
      <meta name="mobile-web-app-capable" content="yes">
      <link rel="manifest" href="/subscribes/manifest.webmanifest">
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
      <meta name="apple-mobile-web-app-title" content="TZMC | Medical Center">
      <meta name="theme-color" content="#293B8F">
    
      <title>TZMC | מרכז רפואי</title>
    
      <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
      <link rel="stylesheet" href="css/style.css?v=29.0">
    </head>
    
    <body>
        
      <div id="loading" class="loading">
          <span>מאתחל...</span>
          <small class="loading-subtext">אנא המתן</small>
      </div>
    
      <div id="viewSetup" class="setup-screen hidden" role="dialog" aria-modal="true" aria-labelledby="setupTitle" aria-hidden="true">
         <div class="setup-card" role="document">
            
            <img src="assets/icon.png" alt="Logo" class="setup-logo">
    
            <h2 id="setupTitle">ברוכים הבאים למרכז רפואי צפון</h2>
            <p>הפעל התראות כדי להתחיל לקבל הודעות.</p>
            
            <div id="installContainer" class="install-container hidden">
                 <button id="installBtn" class="btn btn-primary install-btn" type="button">
                     <span class="material-icons">download</span>
                     <span>התקן אפליקציה</span>
                 </button>
            </div>
            
            <div class="phone-input-alert">
                <span class="material-icons">smartphone</span>
                <span>נא להזין מספר נייד (ללא מקפים)</span>
            </div>
            <input type="tel" id="usernameInput" class="phone-input" placeholder="05XXXXXXXX" maxlength="10" inputmode="tel" autocomplete="tel" aria-describedby="statusMessage">
            <button id="subscribeButton" class="btn btn-primary" type="button">הרשמה</button>
            <div id="statusMessage" class="status-message" role="status" aria-live="polite"></div>
         </div>
      </div>
    
      <div id="viewContacts" class="view-contacts hidden">
          <div class="app-header">
              
              <div class="main-menu-wrapper">
                  <button id="mainMenuToggleBtn" class="material-icons icon-btn main-menu-btn" type="button" aria-label="פתיחת תפריט" title="פתיחת תפריט">more_vert</button>
                  
                  <div id="mainMenu" class="attach-menu main-menu hidden" role="menu">
                      <button id="backupChatsBtn" type="button">
                          <span class="material-icons menu-icon menu-icon-primary">cloud_upload</span>
                          <span>גיבוי צ'אטים</span>
                      </button>
                      <button id="clearChatsBtn" class="menu-danger" type="button">
                            <span class="material-icons menu-icon menu-icon-danger">delete_forever</span>
                            <span>מחק הכל</span>
                        </button>
                  </div>
                  <span class="header-title">צ'אטים</span>
              </div>
              
               <div class="header-right">  
               </div>
              <div class="header-left">
                  <span id="networkStatus" class="network-status" role="status" aria-live="polite"></span>
                  <button id="logoutBtn" class="material-icons icon-btn logout-btn" type="button" aria-label="התנתקות" title="התנתקות">logout</button>
              </div>
          </div>
    
          <div id="contactsListContainer" class="contact-list"></div>
    
          <button id="btnNewChat" class="btn-new-chat" type="button" aria-label="צ׳אט חדש" title="צ׳אט חדש">
              <span class="material-icons">chat</span>
          </button>
      </div>
    
      <div id="modalNewChat" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="newChatTitle" aria-hidden="true">
          <div class="modal-content" role="document">
              <div class="modal-header">
                  <span id="newChatTitle">התחל צ'אט חדש</span>
                  <button id="closeNewChatBtn" class="material-icons icon-btn modal-close-btn" type="button" aria-label="סגור" title="סגור">close</button>
              </div>
              <div class="search-container">
                  <span class="material-icons search-icon">search</span>
                  <input type="text" id="userSearchInput" class="search-box" placeholder="חפש איש קשר..." aria-label="חיפוש איש קשר">
              </div>
              <div id="modalUserList" class="modal-list">
                  <div class="modal-loading">טוען משתמשים...</div>
              </div>
          </div>
      </div>
    
      <div id="viewChatRoom" class="view-chatroom hidden">
          <div class="app-header">
              <div class="header-right">  
              <button id="backToContactsBtn" class="material-icons icon-btn back-btn" type="button" aria-label="חזרה לרשימת צ׳אטים" title="חזרה לרשימת צ׳אטים">arrow_back</button>
                    
                    <div class="avatar chat-header-avatar">
                        <span class="material-icons">person</span>
                    </div>
                    
                    <div class="chat-header-info">
                        <span class="header-title" id="chatRoomTitle">שם השולח</span>
                    </div>
               </div>
                <div class="header-left">
                    
            
                    <div class="chat-header-actions"> 
                        <span id="networkStatusChat" class="network-status" role="status" aria-live="polite"></span>
                        
                        <a id="headerCallBtn" href="#" class="material-icons icon-btn header-call-btn" aria-label="חיוג" title="חיוג">
                           call
                        </a>
            
                        <button id="deleteChatBtn" class="material-icons icon-btn icon-btn-danger" type="button" aria-label="מחיקת שיחה" title="מחיקת שיחה">delete</button>
                    </div>
                </div>
            </div>
    
          <div class="chat-container">
              <div id="messagesArea" class="messages-area"></div>
              <div class="chat-footer">
                <input type="file" id="fileInput" class="file-input" accept="image/*,application/pdf" aria-label="העלאת קובץ">
            
                <div class="attach-dropdown">
                    <div id="attachMenu" class="attach-menu hidden" role="menu">
                        <button id="attachFileBtn" type="button">
                            <span class="material-icons menu-icon menu-icon-accent">description</span>
                            <span>מסמך / תמונה</span>
                        </button>
                        <button id="shareLocationBtn" type="button">
                            <span class="material-icons menu-icon menu-icon-warn">location_on</span>
                            <span>מיקום</span>
                        </button>
                    </div>
            
                    <button id="toggleAttachBtn" class="material-icons icon-btn attach-toggle-btn" type="button" aria-label="צרף קובץ" title="צרף קובץ">
                        attach_file
                    </button>
                </div>
            
                <textarea 
                id="chatInputBar" 
                placeholder="הקלד הודעה" 
                rows="1"
                aria-label="הקלד הודעה"></textarea>
                
                <button id="sendBtn" class="btn-send-fab" type="button" aria-label="שלח הודעה" title="שלח הודעה">
                    <span class="material-icons">send</span>
                </button>
            </div>
          </div>
      </div>
      <div id="deleteModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle" aria-hidden="true">
        <div class="modal-content modal-confirm" role="document">
            <h3 id="deleteModalTitle" class="modal-title">מחיקת הודעה?</h3>
            <div class="modal-actions modal-actions-column">
                <button id="btnDeleteEveryone" class="btn btn-danger" type="button">מחיקה לכולם</button>
                <button id="btnDeleteMe" class="btn btn-outline-danger" type="button">מחק עבורי</button>
                <button id="btnDeleteClose" class="btn btn-secondary" type="button">סגור</button>
            </div>
        </div>
    </div>
      <div id="confirmModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle" aria-hidden="true">
        <div class="modal-content modal-confirm" role="document">
            <h3 id="confirmModalTitle" class="modal-title">אישור</h3>
            <p id="confirmModalMessage" class="modal-message"></p>
            <div class="modal-actions">
                <button id="confirmModalConfirm" class="btn btn-primary" type="button">כן</button>
                <button id="confirmModalCancel" class="btn btn-secondary" type="button">לא</button>
            </div>
        </div>
      </div>
      <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
      <script src="js/shared-config.js?v=1.1"></script>
      <script src="js/i18n.js?v=1.1"></script>
      <script src="js/network.js?v=1.1"></script>
      <script src="js/app.js?v=33.3"></script>
      <!--<script src="js/bot.js?v=4.0"></script>-->
    
    </body>
</html>
